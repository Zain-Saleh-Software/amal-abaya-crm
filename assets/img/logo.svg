<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 340" role="img" aria-label="Amal — Abaya and more">
  <style>
    .amal { font-family: "Playfair Display", "Cormorant Garamond", Georgia, serif; font-style: italic; font-weight: 600; fill: #ffffff; }
    .tag  { font-family: "Playfair Display", "Cormorant Garamond", Georgia, serif; font-style: normal; font-weight: 400; fill: #ffffff; letter-spacing: 0.04em; }
    .cmark{ font-family: "Inter", system-ui, sans-serif; font-size: 14px; fill: #ffffff; }
  </style>
  <!-- © mark above the A -->
  <text class="cmark" x="118" y="110" text-anchor="middle">©</text>
  <!-- "Amal" wordmark -->
  <text class="amal" x="240" y="200" text-anchor="middle" font-size="180">Amal</text>
  <!-- "Abaya and more" tagline -->
  <text class="tag" x="240" y="280" text-anchor="middle" font-size="48">Abaya and more</text>
</svg>
